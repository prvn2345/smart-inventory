<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="#2563eb"/>

  <!-- Box / package icon -->
  <!-- Bottom box body -->
  <rect x="6" y="15" width="20" height="12" rx="1.5" fill="white" opacity="0.95"/>

  <!-- Box top flap left -->
  <path d="M6 15 L11 10 L16 15 Z" fill="white" opacity="0.7"/>
  <!-- Box top flap right -->
  <path d="M16 15 L21 10 L26 15 Z" fill="white" opacity="0.85"/>

  <!-- Box top edge line -->
  <line x1="6" y1="15" x2="26" y2="15" stroke="#2563eb" stroke-width="1" opacity="0.3"/>

  <!-- Center tape/stripe on box -->
  <rect x="14" y="15" width="4" height="12" fill="#93c5fd" opacity="0.5"/>

  <!-- Upward trend arrow (AI/analytics symbol) -->
  <polyline points="8,24 12,20 15,22 20,17 24,19" stroke="#bfdbfe" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
</svg>
