services:
  - type: web
    name: smart-inventory-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false   # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set manually in Render dashboard
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        value: https://smart-inventory-anc8bjitt-prvn2345s-projects.vercel.app
      - key: STOCK_CHECK_INTERVAL
        value: 5
